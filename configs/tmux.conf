# AKAOIO TMUX CONFIGURATION

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Core settings
set -g mouse on
set -sg escape-time 0
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off

# Prefix: Ctrl-A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Pane splits (preserve current dir)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style + Alt-arrow)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Quick popup shell
bind p display-popup -E -w 80% -h 80% bash

# Activity monitoring
setw -g monitor-activity on
set  -g visual-activity off

# ─── Theme color variables (defaults: dracula) ───────────────────────────────
# Override these via configs/tmux-themes.sh when switching themes.
# Only colors live here — layout/format strings are defined below and never change.
set -g @bg        "#282A36"
set -g @fg        "#F8F8F2"
set -g @accent    "#8BE9FD"
set -g @comment   "#6272A4"
set -g @highlight "#BD93F9"
set -g @active    "#FF79C6"

# ─── Status bar ──────────────────────────────────────────────────────────────
set -g status-position     bottom
set -g status-style        "bg=#{@bg},fg=#{@fg}"
set -g status-interval     15
set -g status-left-length  20
set -g status-right-length 10
set -g status-left         "#[fg=#{@highlight},bold] #S "
set -g status-right        "#[fg=#{@comment}]%H:%M "

# ─── Window tabs ─────────────────────────────────────────────────────────────
setw -g window-status-separator        ""
setw -g window-status-format          "#[fg=#{@comment}] #I #W "
setw -g window-status-current-format  "#[fg=#{@bg},bg=#{@accent},bold] #I #W "
setw -g window-status-activity-style  "fg=#{@active}"
setw -g window-status-bell-style      "fg=#{@bg},bg=#{@active}"

# ─── Pane borders ────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#{@comment}"
set -g pane-active-border-style "fg=#{@accent}"

# ─── Messages ────────────────────────────────────────────────────────────────
set -g message-style         "bg=#{@bg},fg=#{@fg}"
set -g message-command-style "bg=#{@bg},fg=#{@accent}"
set -g display-time 1500
